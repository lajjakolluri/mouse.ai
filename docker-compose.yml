version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tokenopt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tokenoptimizer
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tokenopt-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tokenopt-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tokenopt-network

  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tokenopt-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DSN=postgresql://admin:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/tokenoptimizer
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_HOST=postgres
      - DB_NAME=tokenoptimizer
      - DB_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - tokenopt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tokenopt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - tokenopt-network

volumes:
  postgres_data:
  redis_data:

networks:
  tokenopt-network:
    driver: bridge
